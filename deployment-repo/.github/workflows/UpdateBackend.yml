# ============================================================================
# Update Backend – Caller workflow for the Fkh reusable workflow
# ============================================================================
# Publishes Azure Function code changes without running Terraform.
# Calls the reusable UpdateFkhBackEnd workflow in your Fkh fork.
#
# ── Required GitHub Secrets ─────────────────────────────────────────────────
#   AZURE_DEPLOY_CLIENT_ID        - Client ID of the deployment identity

# ============================================================================

name: Update Backend

on:
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check template freshness
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          try {
            $remote = gh api "repos/Freddy-DK/Fkh/contents/deployment-repo/.github/workflows/UpdateBackend.yml" --jq '.content' 2>$null
            if ($LASTEXITCODE -ne 0 -or -not $remote) { exit 0 }
            $remote = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($remote)).TrimEnd()
          } catch { exit 0 }
          $localPath = '.github/workflows/UpdateBackend.yml'
          if (Test-Path $localPath) {
            $local = (Get-Content $localPath -Raw).TrimEnd()
          } else {
            $local = ''
          }
          if ($remote -ne $local) {
            Write-Host '::warning::UpdateBackend.yml differs from the template in Freddy-DK/Fkh. Consider syncing from deployment-repo/ in your Fkh fork.'
          }

  update:
    needs: check-version
    uses: Freddy-DK/Fkh/.github/workflows/UpdateFkhBackEnd.yml@main
    with:
      fkh-repo: Freddy-DK/Fkh
    secrets:
      AZURE_DEPLOY_CLIENT_ID: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
