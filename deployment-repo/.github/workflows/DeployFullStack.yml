# ============================================================================
# Deploy Full Stack – Caller workflow for the Fkh reusable workflow
# ============================================================================
# This workflow calls the reusable DeployFkhFullStack workflow in your Fkh fork.
# It passes your deployment.tfvars (from this repo) and secrets to the
# reusable workflow, which handles all Terraform and function publishing.
#
# ── Required GitHub Secrets ─────────────────────────────────────────────────
#   AZURE_DEPLOY_CLIENT_ID        - Client ID of the deployment identity

#   SQL_SA_PASSWORD                - SA password for the SQL Server in AKS
#   GH_APP_PRIVATE_KEY             - PEM-encoded private key of the GitHub App
# ============================================================================

name: Deploy Full Stack

on:
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check template freshness
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OUTDATED=""
          for file in DeployFullStack.yml UpdateBackend.yml CreateImages.yml CheckForUpdates.yml; do
            REMOTE=$(gh api "repos/{{FKH_REPO}}/contents/deployment-repo/.github/workflows/$file" \
              --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo "FETCH_FAILED")
            [ "$REMOTE" = "FETCH_FAILED" ] && continue
            LOCAL=$(cat ".github/workflows/$file" 2>/dev/null || echo "")
            if [ "$REMOTE" != "$LOCAL" ]; then
              OUTDATED="${OUTDATED}  - ${file}\n"
            fi
          done
          if [ -n "$OUTDATED" ]; then
            printf "::warning::The following workflow files differ from the templates in {{FKH_REPO}}:\n%b\nConsider syncing from deployment-repo/ in your Fkh fork." "$OUTDATED"
          fi

  deploy:
    needs: check-version
    uses: {{FKH_REPO}}/.github/workflows/DeployFkhFullStack.yml@main
    with:
      fkh-repo: {{FKH_REPO}}
    secrets:
      AZURE_DEPLOY_CLIENT_ID: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
      SQL_SA_PASSWORD: ${{ secrets.SQL_SA_PASSWORD }}
      GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
