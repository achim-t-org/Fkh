# ============================================================================
# Check for Deployment Repo Updates
# ============================================================================
# Compares this repo's workflow files against the templates in your Fkh fork's
# deployment-repo/ folder. Updates any outdated files automatically.
# ============================================================================

name: Check for Deployment Repo Updates

on:
  schedule:
    - cron: '0 8 * * 1'   # Weekly Monday 8am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check and update workflow files
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          $updated = @()
          foreach ($file in @('DeployFullStack.yml','UpdateBackend.yml','CreateImages.yml','CheckForUpdates.yml')) {
            try {
              $stderr = $null
              $remote = gh api "repos/Freddy-DK/Fkh/contents/deployment-repo/.github/workflows/$file" --jq '.content' 2>&1
              if ($LASTEXITCODE -ne 0 -or -not $remote) {
                Write-Host "Skipping $file - gh api exit code: $LASTEXITCODE, output: $remote"
                continue
              }
              $remote = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($remote)).TrimEnd()
            } catch { continue }
            $localPath = ".github/workflows/$file"
            if (Test-Path $localPath) {
              $local = (Get-Content $localPath -Raw).TrimEnd()
            } else {
              $local = ''
            }
            if ($remote -ne $local) {
              Set-Content $localPath -Value $remote -NoNewline
              $updated += $file
              Write-Host "Updated $file"
            }
          }
          if ($updated.Count -eq 0) {
            Write-Host 'All workflow files are up to date.'
          } else {
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add .github/workflows/
            git commit -m "Update deployment workflows from Freddy-DK/Fkh"
            git push
          }
          exit 0
