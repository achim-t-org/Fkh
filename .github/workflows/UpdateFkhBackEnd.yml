# ============================================================================
# Update Fkh Backend – Publish function code only (reusable workflow)
# ============================================================================
# Called from a private deployment repo via workflow_call.
# Use this when backend code changes but infrastructure is unchanged.
# The deployment repo provides the tfvars file (config/deployment.tfvars);
# this workflow checks out the Fkh fork for Terraform state and backend code.
#
# ── Deployment identity (OIDC, passwordless) ───────────────────────────────
#   Uses the same identity as the Deploy workflow (App Registration or
#   Managed Identity). See docs/AzureSetup-PathA.md for setup options.
#   Federated credential config:
#     - Issuer:   https://token.actions.githubusercontent.com
#     - Subject:  repo:<org>/<deployment-repo>:ref:refs/heads/main
#     - Audience: api://AzureADTokenExchange
#   Minimum role assignment:
#     • Contributor on the Function App resource group
#
# ── Inputs ──────────────────────────────────────────────────────────────────
#   fkh-repo   - Owner/name of the Fkh fork (default: Freddy-DK/Fkh)
#   fkh-ref    - Git ref to checkout from the Fkh fork (default: main)
#
# ── Secrets (passed by the caller workflow) ─────────────────────────────────
#   (none — azure_deploy_client_id, tenant_id and subscription_id are read from config/deployment.tfvars)
# ============================================================================

name: Update Fkh Backend

on:
  workflow_call:
    inputs:
      fkh-repo:
        description: 'Owner/name of the Fkh fork (e.g. Freddy-DK/Fkh)'
        required: false
        type: string
        default: 'Freddy-DK/Fkh'
      fkh-ref:
        description: 'Git ref to checkout from the Fkh fork (e.g. main, a branch name, a tag or a commit SHA)'
        required: false
        type: string
        default: 'main'
      staging:
        description: 'Deploy to the staging Function App instead of production'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  ARM_USE_OIDC: true

jobs:
  deployFkhBackend:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout deployment repo (for tfvars)
        uses: actions/checkout@v6
        with:
          path: deployment

      - name: Checkout Fkh fork (for terraform + backend code)
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.fkh-repo }}
          ref: ${{ inputs.fkh-ref }}
          path: fkh

      # ── Resolve tfvars ────────────────────────────────────────────────────
      - name: Resolve tfvars file
        id: tfvars
        shell: pwsh
        working-directory: fkh/terraform
        run: |
          $tfvarsFile = "../../deployment/config/deployment.tfvars"
          if (-not (Test-Path $tfvarsFile)) {
            throw "tfvars file not found at config/deployment.tfvars in the deployment repo."
          }
          "tfvars_file=$tfvarsFile" >> $env:GITHUB_OUTPUT

      # ── Parse tfvars ──────────────────────────────────────────────────────
      - name: Parse tfvars
        id: parse
        shell: pwsh
        working-directory: fkh/terraform
        run: |
          $varFile = "${{ steps.tfvars.outputs.tfvars_file }}"
          function Get-TfVar([string]$Name, [string]$File) {
            $line = Get-Content $File | Where-Object { $_ -match "^\s*$Name\s*=" } | Select-Object -First 1
            if ($line -match '=\s*"([^"]+)"') { return $Matches[1] }
            throw "Could not find $Name in $File"
          }

          $subscriptionId = Get-TfVar "subscription_id" $varFile
          $tenantId       = Get-TfVar "tenant_id" $varFile
          $deployClientId = Get-TfVar "azure_deploy_client_id" $varFile

          "subscription_id=$subscriptionId" >> $env:GITHUB_OUTPUT
          "tenant_id=$tenantId"             >> $env:GITHUB_OUTPUT
          "deploy_client_id=$deployClientId" >> $env:GITHUB_OUTPUT

          # Set ARM env vars for Terraform OIDC (used by all subsequent steps)
          "ARM_CLIENT_ID=$deployClientId"       >> $env:GITHUB_ENV
          "ARM_TENANT_ID=$tenantId"             >> $env:GITHUB_ENV
          "ARM_SUBSCRIPTION_ID=$subscriptionId" >> $env:GITHUB_ENV

      # ── Tool setup ────────────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Azure CLI login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ steps.parse.outputs.deploy_client_id }}
          tenant-id: ${{ steps.parse.outputs.tenant_id }}
          subscription-id: ${{ steps.parse.outputs.subscription_id }}

      # ── Resolve function app name ─────────────────────────────────────────
      - name: Resolve function app name and resource group
        id: resolve
        shell: pwsh
        working-directory: fkh/terraform
        run: |
          # Read from Terraform state
          $varFile = "${{ steps.tfvars.outputs.tfvars_file }}"
            function Get-TfVar([string]$Name, [string]$File) {
              $line = Get-Content $File | Where-Object { $_ -match "^\s*$Name\s*=" } | Select-Object -First 1
              if ($line -match '=\s*"([^"]+)"') { return $Matches[1] }
              throw "Could not find $Name in $File"
            }

            $subscriptionId = Get-TfVar "subscription_id" $varFile
            $deploymentName = Get-TfVar "fkhDeploymentName" $varFile

            $stateRg        = "fkh-$deploymentName-state"
            $stateAccount   = "fkh$($deploymentName.Replace('-','').Substring(0, [Math]::Min($deploymentName.Replace('-','').Length, 14)))state"

            # Initialize Terraform to read state
            terraform init -reconfigure `
              -backend-config="resource_group_name=$stateRg" `
              -backend-config="storage_account_name=$stateAccount" `
              -backend-config="container_name=tfstate" `
              -backend-config="key=$deploymentName.tfstate" `
              -backend-config="subscription_id=$subscriptionId" `
              -backend-config="use_azuread_auth=true"

            $staging = "${{ inputs.staging }}" -eq "true"
            if ($staging) {
              $functionAppName = terraform output -raw staging_function_app_name
              if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($functionAppName)) {
                throw "Staging backend is not enabled. Set enable_staging_backend = true in deployment.tfvars and run a full deploy first."
              }
              Write-Host "Deploying to STAGING: $functionAppName"
            }
            else {
              $functionAppName = terraform output -raw function_app_name
              if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($functionAppName)) {
                throw "Could not retrieve function_app_name from Terraform output."
              }
            }
            $resourceGroupName = terraform output -raw resource_group_name
            if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($resourceGroupName)) {
              throw "Could not retrieve resource_group_name from Terraform output."
            }

          "function_app_name=$functionAppName"     >> $env:GITHUB_OUTPUT
          "resource_group_name=$resourceGroupName" >> $env:GITHUB_OUTPUT
          Write-Host "Function App: $functionAppName"
          Write-Host "Resource Group: $resourceGroupName"

          # Also resolve staging app name for the auto-deploy-to-staging step
          $stagingAppName = terraform output -raw staging_function_app_name 2>$null
          if (-not [string]::IsNullOrWhiteSpace($stagingAppName)) {
            "staging_function_app_name=$stagingAppName" >> $env:GITHUB_OUTPUT
            Write-Host "Staging Function App: $stagingAppName"
          }

      # ── Publish function code ─────────────────────────────────────────────
      - name: Publish Azure Function
        shell: pwsh
        working-directory: fkh/fkh-backend
        run: |
          $functionAppName   = "${{ steps.resolve.outputs.function_app_name }}"
          $resourceGroupName = "${{ steps.resolve.outputs.resource_group_name }}"

          Write-Host "Publishing to $functionAppName in $resourceGroupName..."

          func azure functionapp publish $functionAppName --dotnet-isolated
          if ($LASTEXITCODE -ne 0) {
            Write-Host "func publish exited with code $LASTEXITCODE — restarting function app..." -ForegroundColor Yellow
            az functionapp restart --name $functionAppName --resource-group $resourceGroupName
            if ($LASTEXITCODE -ne 0) { throw "func publish and fallback restart both failed." }
            Write-Host "Function app restarted successfully." -ForegroundColor Green
            throw "func publish failed (build errors). Function app was restarted but new code was NOT deployed."
          }

          Write-Host "Function app $functionAppName published successfully." -ForegroundColor Green

      # ── Also publish to staging (when deploying to production and staging exists) ──
      - name: Publish to staging
        if: inputs.staging != true && steps.resolve.outputs.staging_function_app_name != ''
        shell: pwsh
        working-directory: fkh/fkh-backend
        run: |
          $stagingAppName    = "${{ steps.resolve.outputs.staging_function_app_name }}"
          $resourceGroupName = "${{ steps.resolve.outputs.resource_group_name }}"

          Write-Host "Also publishing to staging: $stagingAppName..."

          func azure functionapp publish $stagingAppName --dotnet-isolated
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Staging publish failed (exit code $LASTEXITCODE) — production was deployed successfully." -ForegroundColor Yellow
            az functionapp restart --name $stagingAppName --resource-group $resourceGroupName
          }

          Write-Host "Staging function app $stagingAppName published successfully." -ForegroundColor Green
