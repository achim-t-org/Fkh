# ============================================================================
# Update Fkh Backend – Publish function code only (no Terraform apply)
# ============================================================================
# Mirrors terraform/deploy-functionupdate.ps1 for CI/CD use.
# Use this when backend code changes but infrastructure is unchanged.
#
# ── Azure AD App Registration (OIDC, passwordless) ─────────────────────────
#   Uses the same App Registration as the Deploy workflow.
#   Federated credential config:
#     - Issuer:   https://token.actions.githubusercontent.com
#     - Subject:  repo:<org>/<repo>:ref:refs/heads/main
#     - Audience: api://AzureADTokenExchange
#   Minimum role assignment:
#     • Contributor on the Function App resource group
#
# ── Required GitHub Secrets ─────────────────────────────────────────────────
#   AZURE_DEPLOY_CLIENT_ID         - App Registration's Application (client) ID
#   AZURE_DEPLOY_TENANT_ID         - Azure AD tenant ID
#   AZURE_DEPLOY_SUBSCRIPTION_ID   - Azure subscription ID
#
# ── Required GitHub Secrets (continued) ─────────────────────────────────────
#   TFVARS_URL          - (Recommended) A secure download URL pointing to your
#                          .tfvars file (e.g. Azure Blob SAS URL). The file is
#                          downloaded at deploy time; all string values are masked
#                          in workflow logs.
#
# ── Required GitHub Variables (non-secret) ──────────────────────────────────
#   TFVARS_FILE         - (Fallback) Path to a .tfvars file committed in the repo,
#                          e.g. organizations/freddydk.tfvars.
#                          Only used if TFVARS_URL is not set.
# ============================================================================

name: Update Fkh Backend

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_DEPLOY_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_DEPLOY_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true

jobs:
  deployFkhBackend:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6

      # ── Resolve tfvars ────────────────────────────────────────────────────
      - name: Resolve tfvars file
        id: tfvars
        shell: pwsh
        working-directory: terraform
        env:
          TFVARS_URL: ${{ secrets.TFVARS_URL }}
        run: |
          if ($env:TFVARS_URL) {
            $tfvarsFile = "organizations/_from_url.tfvars"
            New-Item -ItemType Directory -Path (Split-Path $tfvarsFile) -Force | Out-Null
            Invoke-WebRequest -Uri $env:TFVARS_URL -OutFile $tfvarsFile -UseBasicParsing
            Write-Host "Downloaded tfvars from TFVARS_URL."
          } elseif ("${{ vars.TFVARS_FILE }}") {
            $tfvarsFile = "${{ vars.TFVARS_FILE }}"
            Write-Host "Using TFVARS_FILE -> $tfvarsFile"
          } else {
            throw "Neither TFVARS_URL (secret) nor TFVARS_FILE (variable) is set. Configure one in Settings -> Secrets and variables -> Actions."
          }
          # Mask all non-empty, non-comment lines and all quoted string values
          foreach ($line in Get-Content $tfvarsFile) {
            $trimmed = $line.Trim()
            if ($trimmed -and -not $trimmed.StartsWith('#')) {
              Write-Host "::add-mask::$trimmed"
            }
            if ($line -match '=\s*"([^"]+)"') {
              $val = $Matches[1]
              if ($val.Length -ge 4) {
                Write-Host "::add-mask::$val"
              }
            }
          }
          "tfvars_file=$tfvarsFile" >> $env:GITHUB_OUTPUT

      # ── Tool setup ────────────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Azure CLI login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_DEPLOY_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_DEPLOY_SUBSCRIPTION_ID }}

      # ── Resolve function app name ─────────────────────────────────────────
      - name: Resolve function app name and resource group
        id: resolve
        shell: pwsh
        working-directory: terraform
        run: |
          # Read from Terraform state
          $varFile = "${{ steps.tfvars.outputs.tfvars_file }}"
            function Get-TfVar([string]$Name, [string]$File) {
              $line = Get-Content $File | Where-Object { $_ -match "^\s*$Name\s*=" } | Select-Object -First 1
              if ($line -match '=\s*"([^"]+)"') { return $Matches[1] }
              throw "Could not find $Name in $File"
            }

            $subscriptionId = Get-TfVar "subscription_id" $varFile
            $orgName        = Get-TfVar "org_name" $varFile

            $stateRg        = "fkh-$orgName-state"
            $stateAccount   = "fkh$($orgName.Replace('-','').Substring(0, [Math]::Min($orgName.Replace('-','').Length, 14)))state"

            # Initialize Terraform to read state
            terraform init -reconfigure `
              -backend-config="resource_group_name=$stateRg" `
              -backend-config="storage_account_name=$stateAccount" `
              -backend-config="container_name=tfstate" `
              -backend-config="key=$orgName.tfstate" `
              -backend-config="subscription_id=$subscriptionId" `
              -backend-config="use_azuread_auth=true"

            $functionAppName = terraform output -raw function_app_name
            if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($functionAppName)) {
              throw "Could not retrieve function_app_name from Terraform output."
            }
            $resourceGroupName = terraform output -raw resource_group_name
            if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($resourceGroupName)) {
              throw "Could not retrieve resource_group_name from Terraform output."
            }

          "function_app_name=$functionAppName"     >> $env:GITHUB_OUTPUT
          "resource_group_name=$resourceGroupName" >> $env:GITHUB_OUTPUT
          Write-Host "Function App: $functionAppName"
          Write-Host "Resource Group: $resourceGroupName"

      # ── Publish function code ─────────────────────────────────────────────
      - name: Publish Azure Function
        shell: pwsh
        working-directory: fkh-backend
        run: |
          $functionAppName   = "${{ steps.resolve.outputs.function_app_name }}"
          $resourceGroupName = "${{ steps.resolve.outputs.resource_group_name }}"

          Write-Host "Publishing to $functionAppName in $resourceGroupName..."

          func azure functionapp publish $functionAppName --dotnet-isolated
          if ($LASTEXITCODE -ne 0) {
            Write-Host "func publish exited with code $LASTEXITCODE — restarting function app..." -ForegroundColor Yellow
            az functionapp restart --name $functionAppName --resource-group $resourceGroupName
            if ($LASTEXITCODE -ne 0) { throw "func publish and fallback restart both failed." }
            Write-Host "Function app restarted successfully." -ForegroundColor Green
          }
