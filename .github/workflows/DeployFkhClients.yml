name: Deploy Fkh Clients

on:
  push:
    branches: [main]
    paths:
      - 'fkh-vsix/**'
      - 'fkh-cli/**'
  workflow_dispatch:
    inputs:
      production:
        description: 'Publish as production release'
        type: boolean
        default: false

env:
  PUBLISH_OWNER: Freddy-DK
  PUBLISH_REPO: Fkh

jobs:
  deployFkhClients-vsix:
    if: github.repository_owner == env.PUBLISH_OWNER && github.event.repository.name == env.PUBLISH_REPO
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: fkh-vsix
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check VSCE_PAT
        id: check-vsce
        run: |
          if [ -n "$VSCE_PAT" ]; then echo "available=true" >> "$GITHUB_OUTPUT"; fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Set version
        run: |
          BASE=$(node -p "require('./package.json').version.split('.').slice(0,2).join('.')")
          npm version "${BASE}.${{ github.run_number }}" --no-git-tag-version

      - name: Build
        run: |
          npm run build:node
          npm run build:web

      - name: Copy LICENSE
        run: cp ../LICENSE .

      - name: Package VSIX
        run: npx vsce package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: vsix
          path: fkh-vsix/*.vsix

      - name: Publish to Marketplace
        if: steps.check-vsce.outputs.available == 'true'
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.production }}" == "true" ]]; then
            npx vsce publish
          else
            npx vsce publish --pre-release
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  deployFkhClients-cli:
    if: github.repository_owner == env.PUBLISH_OWNER && github.event.repository.name == env.PUBLISH_REPO
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    defaults:
      run:
        shell: bash
        working-directory: fkh-cli
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: NuGet login (OIDC trusted publishing)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: freddy.dk

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Azure Login
        if: vars.AZURE_KEY_VAULT_CERTIFICATE != ''
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_KEY_VAULT_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_KEY_VAULT_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_KEY_VAULT_SUBSCRIPTION_ID }}

      - name: Get access token for Key Vault
        if: vars.AZURE_KEY_VAULT_CERTIFICATE != ''
        id: get-token
        run: |
          TOKEN=$(az account get-access-token --resource https://vault.azure.net --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Set version
        run: |
          BASE=$(sed -n 's/.*<Version>\([^<]*\)<\/Version>.*/\1/p' fkh-cli.csproj | cut -d. -f1,2)
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.production }}" == "true" ]]; then
            VERSION="${BASE}.${{ github.run_number }}"
          else
            VERSION="${BASE}.${{ github.run_number }}-preview"
          fi
          sed -i "s|<Version>.*</Version>|<Version>${VERSION}</Version>|" fkh-cli.csproj

      - name: Build
        run: dotnet build -c Release

      - name: Install AzureSignTool
        if: vars.AZURE_KEY_VAULT_CERTIFICATE != ''
        run: dotnet tool install --global AzureSignTool

      - name: Sign assemblies
        if: vars.AZURE_KEY_VAULT_CERTIFICATE != ''
        run: |
          AzureSignTool sign \
            --azure-key-vault-url ${{ secrets.AZURE_KEY_VAULT_URL }} \
            --azure-key-vault-accesstoken "${{ steps.get-token.outputs.token }}" \
            --azure-key-vault-certificate ${{ vars.AZURE_KEY_VAULT_CERTIFICATE }} \
            --timestamp-rfc3161 http://timestamp.digicert.com \
            --timestamp-digest sha256 \
            -v \
            bin/Release/net8.0/fkh.dll

      - name: Pack
        run: dotnet pack -c Release -o ./nupkg --no-build

      - name: Install NuGetKeyVaultSignTool
        if: vars.AZURE_KEY_VAULT_CERTIFICATE != ''
        run: dotnet tool install --global NuGetKeyVaultSignTool

      - name: Sign NuGet package
        if: vars.AZURE_KEY_VAULT_CERTIFICATE != ''
        run: |
          NuGetKeyVaultSignTool sign ./nupkg/*.nupkg \
            --azure-key-vault-url ${{ secrets.AZURE_KEY_VAULT_URL }} \
            --azure-key-vault-accesstoken "${{ steps.get-token.outputs.token }}" \
            --azure-key-vault-certificate ${{ vars.AZURE_KEY_VAULT_CERTIFICATE }} \
            --timestamp-rfc3161 http://timestamp.digicert.com \
            --timestamp-digest sha256

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuget
          path: fkh-cli/nupkg/*.nupkg

      - name: Publish to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish to GitHub Packages
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --skip-duplicate
