name: Create Images

on:
  workflow_dispatch:
    inputs:
      artifactUrls:
        description: 'Comma-separated list of artifact URLs'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Build matrix from input
        id: set-matrix
        shell: pwsh
        env:
          ARTIFACT_URLS: ${{ github.event.inputs.artifactUrls }}
        run: |
          $urls = $env:ARTIFACT_URLS -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne '' }
          if ($urls.Count -eq 0) { throw "No valid artifact URLs provided" }
          $matrix = @{ artifactUrl = @($urls) } | ConvertTo-Json -Compress
          "matrix=$matrix" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

  build:
    needs: prepare
    runs-on: windows-2022
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        shell: pwsh
        env:
          ARTIFACT_URL: ${{ matrix.artifactUrl }}
        run: |
          $ErrorActionPreference = "Stop"
          Install-Module -Name BcContainerHelper -Force
          Import-Module BcContainerHelper -disableNameChecking
          $artifactUrl = $env:ARTIFACT_URL
          $baseImage = Get-BestGenericImageName
          $labels = Get-BcContainerImageLabels $baseImage
          $osversion = $labels.osversion
          Write-Host "Downloading artifacts for: $artifactUrl"
          Write-Host "Using base image: $baseImage"
          $appUri = [Uri]::new($artifactUrl)
          $imageTag = "$($appUri.AbsolutePath.Replace('/','-').TrimStart('-'))".ToLowerInvariant()
          $artifactPath = Download-Artifacts -artifactUrl $artifactUrl -includePlatform
          $manifest = Get-Content -Path (Join-Path $artifactPath[0] "manifest.json") | ConvertFrom-Json
          $bakFile = Join-Path $artifactPath[0] $manifest.database
          if (!(Test-Path $bakFile)) {
              throw "Unable to locate database backup in artifacts"
          }
          # Save variables for subsequent steps
          "IMAGE_TAG=$imageTag" | Out-File -FilePath $env:GITHUB_ENV -Append
          "IMAGE_NAME=my:$imageTag" | Out-File -FilePath $env:GITHUB_ENV -Append
          "OS_VERSION=$osversion" | Out-File -FilePath $env:GITHUB_ENV -Append
          "BAK_FILE=$bakFile" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ARTIFACT_URL=$artifactUrl" | Out-File -FilePath $env:GITHUB_ENV -Append
          "BASE_IMAGE=$baseImage" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        shell: pwsh
        run: az acr login --name $env:ACR_LOGIN_SERVER

      - name: Upload database backup
        shell: pwsh
        env:
          DBS_STORAGE_ACCOUNT: ${{ secrets.DBS_STORAGE_ACCOUNT }}
        run: |
          $ErrorActionPreference = "Stop"
          $storageAccount = $env:DBS_STORAGE_ACCOUNT
          $containerName = "cronus"
          $blobName = $env:IMAGE_TAG
          $bakFile = $env:BAK_FILE
          $existingBlob = az storage blob show --account-name $storageAccount --container-name $containerName --name $blobName --auth-mode login 2>&1
          if ($LASTEXITCODE -ne 0) {
              Write-Host "Blob '$blobName' not found in container '$containerName'. Uploading..."
              az storage container create --account-name $storageAccount --name $containerName --auth-mode login | Out-Null
              az storage blob upload --account-name $storageAccount --container-name $containerName --name $blobName --file $bakFile --auth-mode login --overwrite false
              if ($LASTEXITCODE -ne 0) { throw "Failed to upload database backup to storage account" }
              Write-Host "Upload complete."
          } else {
              Write-Host "Blob '$blobName' already exists in container '$containerName'. Skipping upload."
          }

      - name: Build and push image
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Import-Module BcContainerHelper -disableNameChecking
          New-BcImage -artifactUrl $env:ARTIFACT_URL -imageName $env:IMAGE_NAME -baseImage $env:BASE_IMAGE -multitenant:$false
          docker tag $env:IMAGE_NAME "$env:ACR_LOGIN_SERVER/businesscentral:$env:IMAGE_TAG"
          docker push "$env:ACR_LOGIN_SERVER/businesscentral:$env:IMAGE_TAG"
          docker tag $env:IMAGE_NAME "$env:ACR_LOGIN_SERVER/businesscentral-$($env:OS_VERSION):$env:IMAGE_TAG"
          docker push "$env:ACR_LOGIN_SERVER/businesscentral-$($env:OS_VERSION):$env:IMAGE_TAG"


