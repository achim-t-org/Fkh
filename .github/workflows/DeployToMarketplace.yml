name: Deploy to Marketplace

on:
  push:
    branches: [main]
    paths:
      - 'fkh-vsix/**'
      - 'fkh-cli/**'
  workflow_dispatch:
    inputs:
      pre-release:
        description: 'Publish as pre-release'
        type: boolean
        default: false

jobs:
  publish-vsix:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fkh-vsix
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Set version
        run: |
          BASE=$(node -p "require('./package.json').version.split('.').slice(0,2).join('.')")
          npm version "${BASE}.${{ github.run_number }}" --no-git-tag-version

      - name: Build
        run: |
          npm run build:node
          npm run build:web

      - name: Copy LICENSE
        run: cp ../LICENSE .

      - name: Package VSIX
        run: vsce package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: vsix
          path: fkh-vsix/*.vsix

      - name: Publish to Marketplace
        run: |
          if [[ "${{ github.event_name }}" == "push" || "${{ inputs.pre-release }}" == "true" ]]; then
            vsce publish --pre-release
          else
            vsce publish
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  publish-cli:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fkh-cli
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Set version
        run: |
          BASE=$(grep -oP '(?<=<Version>)[^<]+' fkh-cli.csproj | cut -d. -f1,2)
          VERSION="${BASE}.${{ github.run_number }}"
          if [[ "${{ github.event_name }}" == "push" || "${{ inputs.pre-release }}" == "true" ]]; then
            VERSION="${VERSION}-preview"
          fi
          sed -i "s|<Version>.*</Version>|<Version>${VERSION}</Version>|" fkh-cli.csproj

      - name: Pack
        run: dotnet pack -c Release -o ./nupkg

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuget
          path: fkh-cli/nupkg/*.nupkg

      - name: Publish to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
