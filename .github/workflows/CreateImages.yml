name: Create Images

on:
  workflow_dispatch:
    inputs:
      artifactUrls:
        description: 'Comma-separated list of artifact URLs'
        required: true
        type: string

  workflow_call:
    inputs:
      artifactUrls:
        description: 'Comma-separated list of artifact URLs'
        required: true
        type: string
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      ACR_LOGIN_SERVER:
        required: true
      DBS_STORAGE_ACCOUNT:
        required: true

permissions:
  id-token: write
  contents: read

env:
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  DBS_STORAGE_ACCOUNT: ${{ secrets.DBS_STORAGE_ACCOUNT }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Resolve artifact URLs
        id: resolve
        shell: pwsh
        env:
          ARTIFACT_URLS: ${{ inputs.artifactUrls }}
        run: |
          Install-Module -Name BcContainerHelper -Force -ErrorAction SilentlyContinue
          Import-Module BcContainerHelper -DisableNameChecking
          $urls = $env:ARTIFACT_URLS -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne '' }
          if ($urls.Count -eq 0) { throw "No valid artifact URLs provided" }
          $resolved = @()
          foreach ($url in $urls) {
            if ($url -like 'https://*') {
              $resolved += $url
            } else {
              # Resolve shorthand (e.g. "///us/latest") using the same logic as the backend
              $segments = ("$url/////") -split '/'
              $storageAccount = if ($segments[0]) { $segments[0] } else { '' }
              $type            = if ($segments[1]) { $segments[1] } else { 'Sandbox' }
              $version         = $segments[2]
              $country         = if ($segments[3]) { $segments[3] } else { 'us' }
              $select          = if ($segments[4]) { $segments[4] } else { 'Latest' }
              $params = @{ type = $type; country = $country; select = $select }
              if ($version) { $params.version = $version }
              if ($storageAccount) { $params.storageAccount = $storageAccount }
              $artifactUrl = Get-BCArtifactUrl @params
              if (-not $artifactUrl) { throw "Could not resolve artifact shorthand: $url" }
              Write-Host "Resolved '$url' -> '$artifactUrl'"
              $resolved += $artifactUrl
            }
          }
          $resolvedStr = $resolved -join ','
          "resolved=$resolvedStr" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build matrix from input
        id: set-matrix
        shell: pwsh
        env:
          ARTIFACT_URLS: ${{ steps.resolve.outputs.resolved }}
        run: |
          $urls = $env:ARTIFACT_URLS -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne '' }
          if ($urls.Count -eq 0) { throw "No valid artifact URLs provided" }
          $matrix = @{ artifactUrl = @($urls) } | ConvertTo-Json -Compress
          "matrix=$matrix" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

  build:
    needs: prepare
    runs-on: windows-2022
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        shell: pwsh
        env:
          ARTIFACT_URL: ${{ matrix.artifactUrl }}
        run: |
          $ErrorActionPreference = "Stop"
          Install-Module -Name BcContainerHelper -Force
          Import-Module BcContainerHelper -disableNameChecking
          $artifactUrl = $env:ARTIFACT_URL
          $baseImage = Get-BestGenericImageName
          $labels = Get-BcContainerImageLabels $baseImage
          $osversion = $labels.osversion
          Write-Host "Downloading artifacts for: $artifactUrl"
          Write-Host "Using base image: $baseImage"
          $appUri = [Uri]::new($artifactUrl)
          $imageTag = "$($appUri.AbsolutePath.Replace('/','-').TrimStart('-'))".ToLowerInvariant()
          $artifactPath = Download-Artifacts -artifactUrl $artifactUrl -includePlatform
          $manifest = Get-Content -Path (Join-Path $artifactPath[0] "manifest.json") | ConvertFrom-Json
          $bakFile = Join-Path $artifactPath[0] $manifest.database
          if (!(Test-Path $bakFile)) {
              throw "Unable to locate database backup in artifacts"
          }
          # Save variables for subsequent steps
          "IMAGE_TAG=$imageTag" | Out-File -FilePath $env:GITHUB_ENV -Append
          "IMAGE_NAME=my:$imageTag" | Out-File -FilePath $env:GITHUB_ENV -Append
          "OS_VERSION=$osversion" | Out-File -FilePath $env:GITHUB_ENV -Append
          "BAK_FILE=$bakFile" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ARTIFACT_URL=$artifactUrl" | Out-File -FilePath $env:GITHUB_ENV -Append
          "BASE_IMAGE=$baseImage" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        shell: pwsh
        run: az acr login --name $env:ACR_LOGIN_SERVER

      - name: Upload database backup
        shell: pwsh
        env:
          DBS_STORAGE_ACCOUNT: ${{ env.DBS_STORAGE_ACCOUNT }}
        run: |
          $ErrorActionPreference = "Stop"
          Import-Module BcContainerHelper -disableNameChecking
          $storageAccount = $env:DBS_STORAGE_ACCOUNT
          $containerName = "cronus"
          $blobName = $env:IMAGE_TAG
          $bakFile = $env:BAK_FILE
          $existingBlob = az storage blob show --account-name $storageAccount --container-name $containerName --name $blobName --auth-mode login 2>&1
          if ($LASTEXITCODE -ne 0) {
              Write-Host "Blob '$blobName' not found in container '$containerName'. Uploading..."
              az storage container create --account-name $storageAccount --name $containerName --auth-mode login | Out-Null
              az storage blob upload --account-name $storageAccount --container-name $containerName --name $blobName --file $bakFile --auth-mode login --overwrite false
              if ($LASTEXITCODE -ne 0) { throw "Failed to upload database backup to storage account" }
              Write-Host "Upload complete."
          } else {
              Write-Host "Blob '$blobName' already exists in container '$containerName'. Skipping upload."
          }

      - name: Upload app and tenant database backups
        shell: pwsh
        env:
          DBS_STORAGE_ACCOUNT: ${{ env.DBS_STORAGE_ACCOUNT }}
        run: |
          $ErrorActionPreference = "Stop"
          $exists = $true
          foreach($dbname in @('app','tenant')) {
            $blobName = "$($env:IMAGE_TAG)-$dbname"
            $existingBlob = az storage blob show --account-name $storageAccount --container-name $containerName --name $blobName --auth-mode login 2>&1
            if ($LASTEXITCODE -ne 0) {
                $exists = $false
                break
            }
          }
          if ($exists) {
              Write-Host "Blobs for app and tenant databases already exist. Skipping upload."
              return
          }
          Import-Module BcContainerHelper -disableNameChecking
          $credential = New-Object pscredential -ArgumentList 'admin', (ConvertTo-SecureString -String ([Guid]::NewGuid().ToString()) -AsPlainText -Force)
          New-BcContainer -accept_eula -containerName bcserver -artifactUrl $env:ARTIFACT_URL -auth UserPassword -Credential $credential -multitenant -myScripts @( @{ "SetupTenant.ps1" = {
            $customConfigFile = Join-Path (Get-Item "C:\Program Files\Microsoft Dynamics NAV\*\Service").FullName "CustomSettings.config"
            [xml]$customConfig = [System.IO.File]::ReadAllText($customConfigFile)
            $serverInstance = $customConfig.SelectSingleNode("//appSettings/add[@key='ServerInstance']").Value
            $multitenant = ($customConfig.SelectSingleNode("//appSettings/add[@key='Multitenant']").Value -eq "true")
            $databaseServer = $customConfig.SelectSingleNode("//appSettings/add[@key='DatabaseServer']").Value
            $databaseInstance = $customConfig.SelectSingleNode("//appSettings/add[@key='DatabaseInstance']").Value
            $databaseName = $customConfig.SelectSingleNode("//appSettings/add[@key='DatabaseName']").Value
            Write-Host -ForegroundColor Yellow "HERE WE GO $serverInstance $databaseName"
            $databaseServerInstance = $databaseServer
            if ("$databaseInstance" -ne "") {
                $databaseServerInstance = "$databaseServer\$databaseInstance"
            }
            Dismount-NavTenant -ServerInstance $ServerInstance -Tenant 'default' -Force | Out-Host
            Backup-SqlDatabase -ServerInstance $databaseServerInstance -database 'default' -BackupFile 'c:\run\my\tenant.bak'
            Backup-SqlDatabase -ServerInstance $databaseServerInstance -database $databaseName -BackupFile "c:\run\my\app.bak"
            Mount-NavTenant -ServerInstance $ServerInstance -Tenant 'default' -DatabaseName 'default' -OverwriteTenantIdInDatabase -Force | Out-Host
          }}) -ErrorAction SilentlyIgnore
          $storageAccount = $env:DBS_STORAGE_ACCOUNT
          $containerName = "cronus"
          foreach($dbname in @('app','tenant')) {
            $blobName = "$($env:IMAGE_TAG)-$dbname"
            $bakFile = Join-Path $bcContainerHelperConfig.hostHelperFolder "extensions\bcserver\my\$($dbname).bak"
            $existingBlob = az storage blob show --account-name $storageAccount --container-name $containerName --name $blobName --auth-mode login 2>&1
            if ($LASTEXITCODE -ne 0) {
                Write-Host "Blob '$blobName' not found in container '$containerName'. Uploading..."
                az storage container create --account-name $storageAccount --name $containerName --auth-mode login | Out-Null
                az storage blob upload --account-name $storageAccount --container-name $containerName --name $blobName --file $bakFile --auth-mode login --overwrite false
                if ($LASTEXITCODE -ne 0) { throw "Failed to upload database backup to storage account" }
                Write-Host "Upload complete."
            } else {
                Write-Host "Blob '$blobName' already exists in container '$containerName'. Skipping upload."
            }
          }

      - name: Build and push image
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Import-Module BcContainerHelper -disableNameChecking
          New-BcImage -artifactUrl $env:ARTIFACT_URL -imageName $env:IMAGE_NAME -baseImage $env:BASE_IMAGE -multitenant:$false
          docker tag $env:IMAGE_NAME "$env:ACR_LOGIN_SERVER/businesscentral:$env:IMAGE_TAG"
          docker push "$env:ACR_LOGIN_SERVER/businesscentral:$env:IMAGE_TAG"
          docker tag $env:IMAGE_NAME "$env:ACR_LOGIN_SERVER/businesscentral-$($env:OS_VERSION):$env:IMAGE_TAG"
          docker push "$env:ACR_LOGIN_SERVER/businesscentral-$($env:OS_VERSION):$env:IMAGE_TAG"


