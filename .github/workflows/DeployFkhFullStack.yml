# ============================================================================
# Deploy – Full Terraform deploy + function publish (reusable workflow)
# ============================================================================
# Called from a private deployment repo via workflow_call.
# The deployment repo provides the tfvars file (config/deployment.tfvars);
# this workflow checks out the Fkh fork for Terraform modules and backend code.
#
# ── Deployment identity (OIDC, passwordless) ───────────────────────────────
#   Create either an App Registration or a User-Assigned Managed Identity
#   in Azure and configure:
#     1. A federated credential for the deployment repo:
#        - Issuer:   https://token.actions.githubusercontent.com
#        - Subject:  repo:<org>/<deployment-repo>:ref:refs/heads/main
#        - Audience: api://AzureADTokenExchange
#     2. Role assignments on the target Azure subscription:
#        • Contributor                (create/manage all resources)
#        • User Access Administrator  (create role assignments for managed identities)
#   See docs/AzureSetup-PathA.md for both options.
#
# ── Inputs ──────────────────────────────────────────────────────────────────
#   fkh-repo   - Owner/name of the Fkh fork (e.g. my-org/Fkh)
#   fkh-ref    - Git ref to checkout from the Fkh fork (default: main)
#
# ── Secrets (passed by the caller workflow) ─────────────────────────────────
#   AZURE_DEPLOY_CLIENT_ID, SQL_SA_PASSWORD, GH_APP_PRIVATE_KEY
#   (tenant_id and subscription_id are read from config/deployment.tfvars)
# ============================================================================

name: Deploy Fkh Full Stack

on:
  workflow_call:
    inputs:
      fkh-repo:
        description: 'Owner/name of the Fkh fork (e.g. my-org/Fkh)'
        required: true
        type: string
      fkh-ref:
        description: 'Git ref to checkout from the Fkh fork'
        required: false
        type: string
        default: 'main'
    secrets:
      AZURE_DEPLOY_CLIENT_ID:
        required: true
      SQL_SA_PASSWORD:
        required: true
      GH_APP_PRIVATE_KEY:
        required: true

permissions:
  id-token: write
  contents: read

env:
  TF_VAR_sql_sa_password: ${{ secrets.SQL_SA_PASSWORD }}
  TF_VAR_github_app_private_key: ${{ secrets.GH_APP_PRIVATE_KEY }}
  TF_VAR_create_images_repo: ${{ github.repository }}
  ARM_CLIENT_ID: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
  ARM_USE_OIDC: true

jobs:
  deployFkhFullStack:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fkh/terraform

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout deployment repo (for tfvars)
        uses: actions/checkout@v6
        with:
          path: deployment

      - name: Checkout Fkh fork (for terraform + backend code)
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.fkh-repo }}
          ref: ${{ inputs.fkh-ref }}
          path: fkh

      # ── Resolve tfvars ────────────────────────────────────────────────────
      - name: Resolve tfvars file
        id: tfvars
        shell: pwsh
        run: |
          $tfvarsFile = "../../deployment/config/deployment.tfvars"
          if (-not (Test-Path $tfvarsFile)) {
            throw "tfvars file not found at config/deployment.tfvars in the deployment repo."
          }
          # Mask all non-empty, non-comment lines and all quoted string values
          foreach ($line in Get-Content $tfvarsFile) {
            $trimmed = $line.Trim()
            if ($trimmed -and -not $trimmed.StartsWith('#')) {
              Write-Host "::add-mask::$trimmed"
            }
            if ($line -match '=\s*"([^"]+)"') {
              $val = $Matches[1]
              if ($val.Length -ge 4) {
                Write-Host "::add-mask::$val"
              }
            }
          }
          "tfvars_file=$tfvarsFile" >> $env:GITHUB_OUTPUT

      # ── Parse tfvars ──────────────────────────────────────────────────────
      - name: Parse tfvars
        id: parse
        shell: pwsh
        run: |
          $varFile = "${{ steps.tfvars.outputs.tfvars_file }}"
          function Get-TfVar([string]$Name, [string]$File) {
            $line = Get-Content $File | Where-Object { $_ -match "^\s*$Name\s*=" } | Select-Object -First 1
            if ($line -match '=\s*"([^"]+)"') { return $Matches[1] }
            throw "Could not find $Name in $File"
          }

          $subscriptionId = Get-TfVar "subscription_id" $varFile
          $tenantId       = Get-TfVar "tenant_id" $varFile
          $location       = Get-TfVar "location" $varFile
          $deploymentName = Get-TfVar "fkhDeploymentName" $varFile
          $githubAppId    = Get-TfVar "github_app_id" $varFile

          $stateRg        = "fkh-$deploymentName-state"
          $stateAccount   = "fkh$($deploymentName.Replace('-','').Substring(0, [Math]::Min($deploymentName.Replace('-','').Length, 14)))state"
          $stateContainer = "tfstate"
          $stateKey       = "$deploymentName.tfstate"

          "state_rg=$stateRg"             >> $env:GITHUB_OUTPUT
          "state_account=$stateAccount"   >> $env:GITHUB_OUTPUT
          "state_container=$stateContainer" >> $env:GITHUB_OUTPUT
          "state_key=$stateKey"           >> $env:GITHUB_OUTPUT
          "subscription_id=$subscriptionId" >> $env:GITHUB_OUTPUT
          "tenant_id=$tenantId"           >> $env:GITHUB_OUTPUT
          "location=$location"            >> $env:GITHUB_OUTPUT
          "deployment_name=$deploymentName" >> $env:GITHUB_OUTPUT
          "github_app_id=$githubAppId"    >> $env:GITHUB_OUTPUT

          # Set ARM env vars for Terraform OIDC (used by all subsequent steps)
          "ARM_TENANT_ID=$tenantId"             >> $env:GITHUB_ENV
          "ARM_SUBSCRIPTION_ID=$subscriptionId" >> $env:GITHUB_ENV

      # ── Tool setup ────────────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Azure CLI login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ steps.parse.outputs.tenant_id }}
          subscription-id: ${{ steps.parse.outputs.subscription_id }}

      # ── Ensure state storage exists ───────────────────────────────────────
      - name: Ensure Terraform state storage
        shell: bash
        run: |
          az account set --subscription "${{ steps.parse.outputs.subscription_id }}"

          echo "Creating resource group ${{ steps.parse.outputs.state_rg }}..."
          az group create \
            --name "${{ steps.parse.outputs.state_rg }}" \
            --location "${{ steps.parse.outputs.location }}" \
            --output none

          echo "Creating storage account ${{ steps.parse.outputs.state_account }}..."
          az storage account create \
            --name "${{ steps.parse.outputs.state_account }}" \
            --resource-group "${{ steps.parse.outputs.state_rg }}" \
            --location "${{ steps.parse.outputs.location }}" \
            --sku Standard_LRS \
            --kind StorageV2 \
            --allow-blob-public-access false \
            --output none

          echo "Creating blob container ${{ steps.parse.outputs.state_container }}..."
          az storage container create \
            --name "${{ steps.parse.outputs.state_container }}" \
            --account-name "${{ steps.parse.outputs.state_account }}" \
            --auth-mode login \
            --output none 2>/dev/null || true

          # Grant the OIDC service principal "Storage Blob Data Contributor" on the state storage account
          STATE_ACCOUNT_ID=$(az storage account show --name "${{ steps.parse.outputs.state_account }}" --resource-group "${{ steps.parse.outputs.state_rg }}" --query id -o tsv)
          az role assignment create \
            --role "Storage Blob Data Contributor" \
            --assignee "${{ secrets.AZURE_DEPLOY_CLIENT_ID }}" \
            --scope "$STATE_ACCOUNT_ID" \
            --output none 2>/dev/null || true

      - name: Wait for RBAC propagation
        shell: bash
        run: |
          for i in $(seq 1 12); do
            if az storage blob list \
              --container-name "${{ steps.parse.outputs.state_container }}" \
              --account-name "${{ steps.parse.outputs.state_account }}" \
              --auth-mode login \
              --num-results 1 > /dev/null 2>&1; then
              echo "Storage RBAC permission confirmed."
              break
            fi
            if [ "$i" -eq 12 ]; then
              echo "::error::Storage Blob Data Contributor role did not propagate after 120s."
              exit 1
            fi
            echo "Waiting for RBAC propagation ($i/12)..."
            sleep 10
          done

      # ── Terraform init ────────────────────────────────────────────────────
      - name: Terraform init
        run: |
          terraform init -reconfigure \
            -backend-config="resource_group_name=${{ steps.parse.outputs.state_rg }}" \
            -backend-config="storage_account_name=${{ steps.parse.outputs.state_account }}" \
            -backend-config="container_name=${{ steps.parse.outputs.state_container }}" \
            -backend-config="key=${{ steps.parse.outputs.state_key }}" \
            -backend-config="subscription_id=${{ steps.parse.outputs.subscription_id }}" \
            -backend-config="use_azuread_auth=true"

      # ── Bootstrap (AKS + core infra) ──────────────────────────────────────
      - name: Terraform bootstrap apply
        run: |
          terraform apply \
            -var-file="${{ steps.tfvars.outputs.tfvars_file }}" \
            -target=azurerm_resource_group.this \
            -target=azurerm_kubernetes_cluster.this \
            -target=azurerm_kubernetes_cluster_node_pool.win \
            -target=azurerm_kubernetes_cluster_node_pool.winspot \
            -target=azurerm_container_registry.this \
            -target=azurerm_role_assignment.aks_acr_pull \
            -target=azurerm_role_assignment.function_acr_push \
            -target=azurerm_storage_account.function \
            -target=azurerm_storage_account.dbs \
            -target=azurerm_service_plan.function \
            -target=azurerm_log_analytics_workspace.this \
            -target=azurerm_application_insights.this \
            -target=azurerm_windows_function_app.this \
            -target=azurerm_user_assigned_identity.function \
            -target=azurerm_federated_identity_credential.github_actions \
            -target=azurerm_role_assignment.function_aks \
            -target=azurerm_role_assignment.function_dbs_storage \
            -target=azurerm_role_assignment.function_log_analytics_reader \
            -auto-approve

      # ── Fetch AKS credentials ────────────────────────────────────────────
      - name: Fetch AKS credentials
        run: |
          AKS_RG="fkh-${{ steps.parse.outputs.deployment_name }}"
          AKS_NAME="fkh-${{ steps.parse.outputs.deployment_name }}-aks"
          az aks get-credentials --resource-group "$AKS_RG" --name "$AKS_NAME" --overwrite-existing

      # ── Full Terraform apply ──────────────────────────────────────────────
      - name: Terraform apply
        run: |
          terraform apply \
            -var-file="${{ steps.tfvars.outputs.tfvars_file }}" \
            -auto-approve

      # ── Publish function code ─────────────────────────────────────────────
      - name: Publish Azure Function
        shell: pwsh
        run: |
          $functionAppName   = terraform output -raw function_app_name
          $resourceGroupName = terraform output -raw resource_group_name
          $projectPath       = Resolve-Path "../fkh-backend"

          Push-Location $projectPath
          try {
            func azure functionapp publish $functionAppName --dotnet-isolated
            if ($LASTEXITCODE -ne 0) {
              Write-Host "func publish exited with code $LASTEXITCODE — restarting function app..." -ForegroundColor Yellow
              az functionapp restart --name $functionAppName --resource-group $resourceGroupName
              if ($LASTEXITCODE -ne 0) { throw "func publish and fallback restart both failed." }
            }
          }
          finally {
            Pop-Location
          }

      # ── Sync GitHub Actions secrets ───────────────────────────────────────
      - name: Generate GitHub App token for secret sync
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ steps.parse.outputs.github_app_id }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Sync GitHub Actions secrets to deployment repo
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          REPO="${{ github.repository }}"

          gh secret set AZURE_CLIENT_ID       --repo "$REPO" --body "$(terraform output -raw identity_client_id)"
          gh secret set AZURE_TENANT_ID       --repo "$REPO" --body "$(terraform output -raw tenant_id)"
          gh secret set AZURE_SUBSCRIPTION_ID --repo "$REPO" --body "$(terraform output -raw subscription_id)"
          gh secret set ACR_LOGIN_SERVER      --repo "$REPO" --body "$(terraform output -raw acr_login_server)"
          gh secret set DBS_STORAGE_ACCOUNT   --repo "$REPO" --body "$(terraform output -raw dbs_storage_account_name)"

          echo "GitHub Actions secrets synced to $REPO"
