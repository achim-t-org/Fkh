name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-vsix:
    name: Build VS Code Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: fk8s-vsix
        run: npm ci

      - name: Compile
        working-directory: fk8s-vsix
        run: npm run compile

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package VSIX
        working-directory: fk8s-vsix
        run: vsce package --no-dependencies

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: fk8s-vsix
          path: fk8s-vsix/*.vsix

  build-cli:
    name: Build CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish CLI (linux-x64)
        working-directory: fk8s-cli
        run: >
          dotnet publish fk8s-cli.csproj
          --configuration Release
          --runtime linux-x64
          --self-contained true
          -p:PublishSingleFile=true
          --output ../artifacts/cli/linux-x64

      - name: Publish CLI (win-x64)
        working-directory: fk8s-cli
        run: >
          dotnet publish fk8s-cli.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          --output ../artifacts/cli/win-x64

      - name: Publish CLI (osx-x64)
        working-directory: fk8s-cli
        run: >
          dotnet publish fk8s-cli.csproj
          --configuration Release
          --runtime osx-x64
          --self-contained true
          -p:PublishSingleFile=true
          --output ../artifacts/cli/osx-x64

      - name: Publish CLI (osx-arm64)
        working-directory: fk8s-cli
        run: >
          dotnet publish fk8s-cli.csproj
          --configuration Release
          --runtime osx-arm64
          --self-contained true
          -p:PublishSingleFile=true
          --output ../artifacts/cli/osx-arm64

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fk8s
          path: artifacts/cli/
